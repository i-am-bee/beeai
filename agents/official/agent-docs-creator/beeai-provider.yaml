manifestVersion: 1
driver: nodejs
package: "git+https://github.com/i-am-bee/beeai@agents-v0.0.39#path=agents/official/agent-docs-creator"
serverType: http
mcpTransport: sse
mcpEndpoint: /sse
command: ["server"]
env:
- name: MODEL
  required: true
  description: "Model to use from the specified API."
- name: API_BASE
  required: true
  description: "Base URL for OpenAI-compatible API endpoint"
- name: API_KEY
  required: true
  description: "API key for OpenAI-compatible API endpoint"
