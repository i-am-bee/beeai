manifestVersion: 1
driver: python
pythonVersion: "3.11"
package: "git+https://github.com/i-am-bee/beeai.git@agents-v0.0.33#subdirectory=agents/community/langgraph-agents"
serverType: http
mcpTransport: sse
mcpEndpoint: /sse
command: ["langgraph-agents"]
env:
- name: MODEL
  required: true
  description: "Model to use from the specified API."
- name: API_BASE
  required: true
  description: "Base URL for OpenAI-compatible API endpoint"
- name: API_KEY
  required: true
  description: "API key for OpenAI-compatible API endpoint"
